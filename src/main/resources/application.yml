# Real SEO bug found and fixed (2026-07-12): in production this app sits
# behind Caddy, which terminates HTTPS and proxies to this app over plain
# HTTP on localhost -- Caddy does send X-Forwarded-Proto: https on every
# request, but Spring Boot ignores forwarded headers by default (a
# deliberate security default: trusting them blindly would let a client
# spoof its own scheme/host if the app were ever exposed directly). Without
# this, every absolute URL this app builds from the incoming request
# (HttpServletRequest.getScheme(), and everything built from it --
# SitemapController's sitemap.xml, most visibly) reports "http", even
# though every real visitor is on https. "framework" tells Spring itself
# to read and honor those headers, which is the right level of trust here
# since Caddy is this app's only path to the internet (UFW blocks direct
# access to the app's own port from outside).
server:
  forward-headers-strategy: framework

spring:
  application:
    name: vinoigitare-boot
  # English is still the default for a first-time visitor (a real language
  # switcher landed 2026-07-12 -- see com.vinoigitare.web.LocaleConfig --
  # so this is no longer "forced regardless of preference", just the
  # starting point until someone actually picks English/Croatian/Serbian
  # via the nav switcher, which then persists via a cookie). Deliberately
  # NOT auto-selecting from the browser's Accept-Language header even now:
  # a visitor's browser locale is a weak, often-wrong signal (shared/work
  # computers, OS installed in a different language than the person reads,
  # etc.) compared to an explicit choice, and Google's own crawler -- which
  # sends no meaningful Accept-Language -- should consistently see the
  # same English version every time it indexes a page.
  #
  # LocaleConfig defines its own LocaleResolver/LocaleChangeInterceptor
  # beans, which is why there's no spring.mvc.locale(-resolver) property
  # here any more -- a self-defined LocaleResolver bean takes precedence
  # over this auto-configuration shortcut, so leaving the old properties
  # in place would just be dead, misleading configuration.
  #
  # Phase 4a: embedded H2, file-mode so data survives restarts. AUTO_SERVER
  # lets a second JVM (e.g. a one-off script, or running tests alongside a
  # live dev instance) connect to the same file without a lock error.
  # Overridable via VINOIGITARE_DB for the same reason VINOIGITARE_HOME
  # overrides the songs directory. Tests never use this -- see
  # AbstractSpringBootTest, which points every @SpringBootTest at an
  # isolated in-memory database instead.
  datasource:
    url: jdbc:h2:file:${VINOIGITARE_DB:./data/vinoigitare-db};AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  # Admin-auth plan (~/knowledge/projects/vinoigitare/admin-auth-plan.md):
  # a single admin credential gating /admin/** (see
  # com.vinoigitare.security.SecurityConfig), sourced from env vars the
  # same way VINOIGITARE_DB/VINOIGITARE_HOME already are above -- the
  # "changeme" default only matters for local dev convenience; a real
  # deployment sets VINOIGITARE_ADMIN_PASSWORD in the environment, never
  # committed here.
  security:
    user:
      name: ${VINOIGITARE_ADMIN_USER:admin}
      password: ${VINOIGITARE_ADMIN_PASSWORD:changeme}

vinoigitare:
  # Directory containing song files. Overridable via the VINOIGITARE_HOME
  # env var, mirroring the old app's VINOIGITARE_HOME/vinoigitare.properties
  # convention. Defaults to a local folder under the project for dev use --
  # no real song data ships with this repo (Phase 1+ territory).
  songs-dir: ${VINOIGITARE_HOME:./data/songs}
