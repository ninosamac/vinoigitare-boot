<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head(#{songbook.title})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <h1 class="h4 mb-3" th:text="#{songbook.title}">My Songbook</h1>
    <p class="text-muted small" th:text="#{songbook.intro}">Placeholder intro text.</p>

    <p data-songbook-empty th:text="#{songbook.empty}" hidden>No songs added yet.</p>

    <!--
      data-label-move-up/-down (2026-07-19, issue #9): read by
      static/js/songbook.js's renderRow, same reasoning/pattern as
      song.html's data-label-add/-remove on the toggle button --
      rows here are built entirely in JS, not server-rendered per song,
      so translated label text has to arrive via attributes rather than
      th:text on some per-row template that doesn't exist.
    -->
    <ul class="list-unstyled" data-songbook-list
        th:data-label-move-up="#{songbook.moveUp}" th:data-label-move-down="#{songbook.moveDown}"></ul>

    <p class="text-muted small">
        <span th:text="#{songbook.countLabel}">Songs:</span>
        <span data-songbook-count>0</span>
    </p>

    <!--
      Book title + chord-diagrams toggle (2026-07-15, Nino's request):
      both persisted in localStorage the same way the selection itself
      is, via static/js/songbook.js -- but submitted as plain hidden
      fields the same way the selection field already is, rather than
      relying on the visible <input>/<checkbox> elements' own name
      attributes. This sidesteps the classic unchecked-checkbox-submits-
      nothing ambiguity entirely (an unchecked box sends no value at
      all, so distinguishing "unchecked" from "field not present" needs
      either a hidden-fallback-field convention or, simpler here since
      JS is already driving the selection field the same way, just
      always writing an explicit "true"/"false" string.
    -->
    <div class="mb-3">
        <label class="form-label" for="songbookTitleInput" th:text="#{songbook.titleLabel}">Book title</label>
        <input type="text" class="form-control" id="songbookTitleInput" data-songbook-title maxlength="60"
               th:placeholder="#{songbook.pdfCoverTitle}"/>
    </div>
    <div class="form-check mb-3">
        <input type="checkbox" class="form-check-input" id="songbookIncludeDiagramsInput" data-songbook-include-diagrams/>
        <label class="form-check-label" for="songbookIncludeDiagramsInput" th:text="#{songbook.includeChordDiagramsLabel}">Include chord diagrams</label>
    </div>

    <!--
      A real form POST, not a GET link: the selection (id+transpose
      pairs) travels as a single form field, since a large songbook could
      realistically exceed a comfortable URL length as a query string.
      static/js/songbook.js populates the hidden inputs from localStorage
      right before submit and disables the button when empty -- a plain
      disabled attribute, not the Bootstrap-CSS-only trick song.html's
      "Add to my songbook" area uses, since this is a real <button>, not
      an <a>. th:action means the CSRF token auto-injects the same way
      every other form in this app already does.

      Two forms below, never both present at once (sec:authorize removes
      whichever doesn't apply entirely from the rendered page, not just
      hides it) -- Phase B (2026-07-17, see
      ~/knowledge/projects/vinoigitare/personalized-songbook-pdf-plan.md):
      an admin testing the feature himself still gets Phase A's original
      free, direct /songbook/generate; every other (public) visitor now
      goes through the real Stripe paywall at /songbook/checkout instead.
      Both share the same data-songbook-generate/-selection-field/etc.
      attributes, so static/js/songbook.js's existing querySelector-based
      wiring needs no changes -- it only ever finds the one form actually
      in the DOM.
    -->
    <form method="post" th:action="@{/songbook/generate}" data-songbook-generate-form sec:authorize="isAuthenticated()">
        <input type="hidden" name="selection" data-songbook-selection-field/>
        <input type="hidden" name="bookTitle" data-songbook-title-field/>
        <input type="hidden" name="includeChordDiagrams" data-songbook-include-diagrams-field/>
        <button type="submit" class="btn btn-primary" data-songbook-generate th:text="#{songbook.generatePdf}" disabled>Generate PDF</button>
    </form>

    <div sec:authorize="!isAuthenticated()">
        <!--
          No live price estimate here (2026-07-18) -- pricing switched
          from song count to actual rendered page count (see
          ~/knowledge/projects/vinoigitare/personalized-songbook-pdf-plan.md
          §1c), which the client has no way to know without a full
          server-side render. Showing a guessed price from song count
          alone would just be wrong, especially right around the 100-page
          cap -- the real price is computed at checkout time and shown on
          Stripe's own checkout page before any payment details are asked
          for, so nothing here needs to (or safely can) anticipate it.
        -->
        <p class="text-muted small" th:text="#{songbook.priceTiers}">Price tiers</p>
        <p class="text-danger small" th:if="${param.tooManyPages}" th:text="#{songbook.tooManyPagesError}">Too many pages.</p>
        <form method="post" th:action="@{/songbook/checkout}" data-songbook-generate-form>
            <input type="hidden" name="selection" data-songbook-selection-field/>
            <input type="hidden" name="bookTitle" data-songbook-title-field/>
            <input type="hidden" name="includeChordDiagrams" data-songbook-include-diagrams-field/>
            <button type="submit" class="btn btn-primary" data-songbook-generate th:text="#{songbook.checkoutButton}" disabled>Buy my songbook PDF</button>
        </form>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:src="@{/js/songbook.js}"></script>
<script th:src="@{/js/theme-toggle.js}"></script>
<script th:src="@{/js/font-size-toggle.js}"></script>
<script th:src="@{/js/preferences-menu.js}"></script>
</body>
</html>
