<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{admin.allSongs})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0" th:text="#{admin.allSongs}">All Songs</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-primary btn-sm" th:href="@{/admin/new}" th:text="#{admin.newSong}">New Song</a>
            <!-- Spring Security's default logout (admin-auth plan, step 3):
                 POST /logout, redirects to /login?logout on success -- login.html
                 already handles that param (see its comment). th:action, not a
                 plain action attribute, so the CSRF token auto-injects the same
                 way it does on the delete form below. -->
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm" th:text="#{admin.logout}">Log out</button>
            </form>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-sm align-middle">
            <thead>
            <tr>
                <th th:text="#{admin.artist}">Artist</th>
                <th th:text="#{admin.title}">Title</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="song : ${songs}">
                <td th:text="${song.artist()}">Artist</td>
                <td th:text="${song.title()}">Title</td>
                <td class="text-end text-nowrap">
                    <a class="btn btn-sm btn-outline-secondary" th:href="@{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}" th:text="#{admin.view}">View</a>
                    <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/edit/{id}(id=${song.id()})}" th:text="#{admin.edit}">Edit</a>
                    <form th:action="@{/admin/delete/{id}(id=${song.id()})}" method="post" class="d-inline"
                          th:attr="data-confirm-delete=#{admin.confirmDelete}" data-delete-form>
                        <button type="submit" class="btn btn-sm btn-outline-danger" th:text="#{admin.delete}">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script>
    // Thymeleaf deliberately rejects free-form string expressions in
    // th:onsubmit/th:onclick (XSS guard: "Only variable expressions
    // returning numbers or booleans are allowed in this context") -- the
    // confirmation message has to come in via a data-* attribute and be
    // read from here instead, per that restriction's own suggested fix.
    document.querySelectorAll("[data-delete-form]").forEach(function (form) {
        form.addEventListener("submit", function (event) {
            if (!window.confirm(form.getAttribute("data-confirm-delete"))) {
                event.preventDefault();
            }
        });
    });
</script>
<script th:src="@{/js/theme-toggle.js}"></script>
<script th:src="@{/js/preferences-menu.js}"></script>
</body>
</html>
