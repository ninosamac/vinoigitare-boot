<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{nav.admin})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0" th:text="#{nav.admin}">Admin</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-primary btn-sm" th:href="@{/admin/new}" th:text="#{admin.newSong}">New Song</a>
            <!-- Personalized songbook PDF, Phase A: no public nav entry for
                 /songbook on purpose (kept invisible to visitors until Phase
                 B ships) -- this admin page is the one reachable entry
                 point during testing. See personalized-songbook-pdf-plan.md. -->
            <a class="btn btn-outline-primary btn-sm" th:href="@{/songbook}" th:text="#{songbook.title}">My Songbook</a>
            <!-- Spring Security's default logout (admin-auth plan, step 3):
                 POST /logout, redirects to /login?logout on success -- login.html
                 already handles that param (see its comment). th:action, not a
                 plain action attribute, so the CSRF token auto-injects the same
                 way it does on the delete form below. -->
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm" th:text="#{admin.logout}">Log out</button>
            </form>
        </div>
    </div>
    <!--
      The song list/table used to live here (view/edit/delete per row).
      Removed (2026-07-12, Nino's request): editing and deleting now
      happen from the song page itself (see song.html's admin-only Edit/
      Delete buttons, sec:authorize-gated), so this page's only remaining
      job is starting a new song and logging out.
    -->
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:src="@{/js/theme-toggle.js}"></script>
<script th:src="@{/js/preferences-menu.js}"></script>
</body>
</html>
