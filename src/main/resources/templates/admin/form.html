<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${isNew} ? #{admin.newSong} : #{admin.editSong})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <h1 class="h4 mb-3" th:text="${isNew} ? #{admin.newSong} : #{admin.editSong}">Song</h1>
    <form th:action="${isNew} ? @{/admin/new} : @{/admin/edit/{id}(id=${originalId})}"
          th:object="${songForm}" method="post">
        <div class="mb-3">
            <label class="form-label" th:text="#{admin.artist}">Artist</label>
            <input type="text" class="form-control" th:field="*{artist}" required="required"/>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{admin.title}">Title</label>
            <input type="text" class="form-control" th:field="*{title}" required="required"/>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{admin.lyricsAndChords}">Lyrics and chords</label>
            <textarea class="form-control song-chords-input" rows="16" th:field="*{chords}"
                      required="required"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" th:text="#{admin.save}">Save</button>
        <a class="btn btn-secondary" th:href="@{/admin}" th:text="#{admin.cancel}">Cancel</a>
    </form>
</main>
<script th:src="@{/js/theme-toggle.js}"></script>
</body>
</html>
