<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{admin.stats})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0" th:text="#{admin.stats}">Stats</h1>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin}" th:text="#{nav.admin}">Admin</a>
    </div>

    <!--
      Analytics, Part 1 (2026-07-22, issue #14): surfaces the per-song
      "views" counter that's been tracked since Phase 4e but never shown
      anywhere -- see AdminController#stats. No new tracking, no new
      dependency: this is data the app already collects.
    -->
    <div class="d-flex flex-wrap gap-4 mb-4">
        <div>
            <div class="text-muted small text-uppercase" th:text="#{admin.stats.totalSongs}">Total songs</div>
            <div class="h3 mb-0" th:text="${totalSongs}">0</div>
        </div>
        <div>
            <div class="text-muted small text-uppercase" th:text="#{admin.stats.totalViews}">Total views</div>
            <div class="h3 mb-0" th:text="${totalViews}">0</div>
        </div>
    </div>

    <h2 class="h6 text-uppercase text-muted mb-2" th:text="#{admin.stats.topViewed}">Top viewed songs</h2>
    <p th:if="${totalViews == 0}" class="text-muted" th:text="#{admin.stats.noViewsYet}">No views recorded yet.</p>
    <table th:if="${totalViews > 0}" class="table table-sm">
        <thead>
        <tr>
            <th th:text="#{admin.artist}">Artist</th>
            <th th:text="#{admin.title}">Title</th>
            <th class="text-end" th:text="#{admin.stats.viewsColumn}">Views</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="song : ${topViewed}">
            <td th:text="${song.artist()}">Artist</td>
            <td>
                <a th:href="@{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}"
                   th:text="${song.title()}">Title</a>
            </td>
            <td class="text-end" th:text="${song.views()}">0</td>
        </tr>
        </tbody>
    </table>

    <!--
      Analytics, Part 3 (2026-07-22): log-based traffic, aggregated by
      LogAnalyticsAggregator from the request log RequestLoggingFilter
      already writes -- see AdminController#stats. Distinct from the
      per-song "views" section above: this counts every logged page (not
      just song pages) and excludes bot/crawler traffic, which the views
      counter above does not.
    -->
    <h2 class="h6 text-uppercase text-muted mt-4 mb-2"
        th:text="#{admin.stats.siteTraffic(${trafficWindowDays})}">Site traffic</h2>
    <p th:if="${totalHits == 0}" class="text-muted" th:text="#{admin.stats.noTrafficYet}">No traffic recorded yet.</p>
    <div th:if="${totalHits > 0}">
        <div class="mb-3">
            <div class="text-muted small text-uppercase" th:text="#{admin.stats.totalHits}">Total hits</div>
            <div class="h3 mb-0" th:text="${totalHits}">0</div>
        </div>
        <div class="row">
            <div class="col-md-6">
                <h3 class="h6 text-uppercase text-muted mb-2" th:text="#{admin.stats.topPages}">Top pages</h3>
                <table class="table table-sm">
                    <thead>
                    <tr>
                        <th th:text="#{admin.stats.pageColumn}">Page</th>
                        <th class="text-end" th:text="#{admin.stats.hitsColumn}">Hits</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="page : ${topPaths}">
                        <td th:text="${page.path()}">/</td>
                        <td class="text-end" th:text="${page.hits()}">0</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="col-md-6">
                <h3 class="h6 text-uppercase text-muted mb-2" th:text="#{admin.stats.topReferrers}">Top referrers</h3>
                <table class="table table-sm">
                    <thead>
                    <tr>
                        <th th:text="#{admin.stats.referrerColumn}">Referrer</th>
                        <th class="text-end" th:text="#{admin.stats.hitsColumn}">Hits</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="referrer : ${topReferrers}">
                        <td th:text="${referrer.referrerHost() == 'direct'} ? #{admin.stats.directReferrer} : ${referrer.referrerHost()}">direct</td>
                        <td class="text-end" th:text="${referrer.hits()}">0</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:src="@{/js/theme-toggle.js}"></script>
<script th:src="@{/js/font-size-toggle.js}"></script>
<script th:src="@{/js/preferences-menu.js}"></script>
</body>
</html>
