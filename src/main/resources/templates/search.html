<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{search.title})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <h1 class="h4 mb-3">
        <span th:text="#{search.title}">Search</span><span th:if="${!query.isEmpty()}" th:text="': ' + ${query}"></span>
    </h1>

    <div th:if="${query.isEmpty()}" class="text-muted" th:text="#{search.enterTerm}">
        Enter a search term.
    </div>
    <div th:if="${!query.isEmpty() and results.isEmpty()}" class="text-muted">
        <span th:text="#{search.noResultsFor}">No results for</span> <strong th:text="${query}">query</strong>.
    </div>

    <ul class="list-unstyled">
        <li th:each="song : ${results}" class="mb-2">
            <a th:href="@{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}">
                <span th:text="${song.artist()}">Artist</span> &ndash;
                <span th:text="${song.title()}">Title</span>
            </a>
        </li>
    </ul>
</main>
</body>
</html>
