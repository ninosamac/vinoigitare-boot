<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<!--
  SEO (2026-07-20): writes its own <head> rather than going through
  fragments :: head(title), same reasoning as index.html/song.html/
  chord-diagrams.html/about.html -- needs a per-artist meta description
  and canonical link the shared fragment doesn't take params for. Found
  missing during a search-discoverability check: makes artist pages
  findable for searches like "{artist name} akordi".
-->
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!-- CTR fix (2026-07-22, issue #11): was just ${artist} + ' - Vino i
         gitare' -- zero mention of "akordi"/"chords" in the actual
         clickable search-result title. Now built from artist.pageTitle
         (see SongBrowseController#pageTitleFor), same reasoning as
         song.html's title. -->
    <title th:text="${pageTitle} + ' - Vino i gitare'">Artist - Vino i gitare</title>
    <meta name="description" th:content="${metaDescription}"/>
    <!-- Absolute, not relative -- built via Thymeleaf's own @{...} URL
         syntax (not string concatenation) so the artist name is properly
         URL-encoded, same reasoning as song.html's canonical link. -->
    <link rel="canonical" th:href="'https://vinoigitare.com' + @{/artists/{artist}(artist=${artist})}"/>
    <meta property="og:type" content="website"/>
    <meta property="og:site_name" content="Vino i gitare"/>
    <meta property="og:url" th:content="'https://vinoigitare.com' + @{/artists/{artist}(artist=${artist})}"/>
    <meta property="og:title" th:content="${artist}"/>
    <meta property="og:description" th:content="${metaDescription}"/>
    <script>
        (function () {
            var theme = localStorage.getItem("vinoigitare.theme");
            if (theme === "dark" || theme === "high-contrast") {
                document.documentElement.setAttribute("data-bs-theme", theme);
            }
            if (localStorage.getItem("vinoigitare.fontSize") === "large") {
                document.documentElement.setAttribute("data-font-size", "large");
            }
        })();
    </script>
    <meta name="i18n-font-size-enable-large" th:content="#{fontSize.enableLarge}"/>
    <meta name="i18n-font-size-disable-large" th:content="#{fontSize.disableLarge}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment. -->
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/icons/favicon-32.png}"/>
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}"/>
    <link rel="manifest" th:href="@{/manifest.json}"/>
    <meta name="theme-color" content="#2f5d50"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment
         on the service-worker registration script; same "own <head>"
         duplication trap as the theme-restore script above. -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js");
            });
        }
    </script>
</head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <p><a th:href="@{/}" th:text="'&larr; ' + #{artist.allArtists}">&larr; All artists</a></p>
    <h1 class="h4 mb-3" th:text="${artist}">Artist</h1>
    <ul class="list-unstyled">
        <li th:each="song : ${songs}" class="index-row mb-2">
            <a th:href="@{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}" th:text="${song.title()}">Title</a>
        </li>
    </ul>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:src="@{/js/theme-toggle.js}"></script>
<script th:src="@{/js/font-size-toggle.js}"></script>
<script th:src="@{/js/preferences-menu.js}"></script>
</body>
</html>
