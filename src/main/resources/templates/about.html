<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{about.title})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <h1 class="h4 mb-3" th:text="#{about.title}">About</h1>

    <section class="mb-4">
        <h2 class="h6 text-uppercase text-muted mb-2" th:text="#{about.motivationHeading}">Why this exists</h2>
        <p th:text="#{about.motivationBody}">Motivation text.</p>
    </section>

    <!--
      Replaces the verbatim-Croatian foreword blockquote (2026-07-14):
      the original 2000 edition -- the physical/PDF songbook this whole
      project is modeled on -- is now offered as a direct download
      (pdf/Vino_i_gitare.pdf at the repo root, served from
      static/downloads/) rather than quoted inline.
    -->
    <section class="mb-4">
        <h2 class="h6 text-uppercase text-muted mb-2" th:text="#{about.originalEditionHeading}">Original 2000 edition</h2>
        <p th:text="#{about.originalEditionBody}">Placeholder original-edition text.</p>
        <a class="btn btn-outline-primary" th:href="@{/downloads/Vino_i_gitare.pdf}" th:text="#{about.downloadOriginalPdf}">Download the original PDF</a>
    </section>

    <section class="mb-4">
        <h2 class="h6 text-uppercase text-muted mb-2" th:text="#{about.privacyHeading}">Privacy</h2>
        <p th:text="#{about.privacyBody}">Placeholder privacy text.</p>
    </section>

    <section class="mb-4">
        <h2 class="h6 text-uppercase text-muted mb-2" th:text="#{about.supportHeading}">Support</h2>
        <p th:text="#{about.supportBody}">Placeholder support text.</p>
        <!--
          Plain static link (Nino's choice over Ko-fi's floating overlay
          widget, 2026-07-12) -- opens in a new tab so leaving to support
          the project never navigates the visitor away from the song
          they were reading. rel="noopener noreferrer": target="_blank"
          without it lets the opened page access window.opener and
          reach back into this one (a real, if obscure, security/privacy
          gap the "noopener" keyword exists specifically to close).
        -->
        <a class="btn btn-primary" href="https://ko-fi.com/ninosamac" target="_blank" rel="noopener noreferrer"
           th:text="#{about.supportButton}">Buy me a coffee</a>
    </section>
</main>
<script th:src="@{/js/theme-toggle.js}"></script>
<script th:src="@{/js/preferences-menu.js}"></script>
</body>
</html>
