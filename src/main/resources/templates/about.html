<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<!--
  SEO (2026-07-15): writes its own <head> rather than going through
  fragments :: head(title), same reasoning as index.html/song.html/
  song-live.html -- needs a meta description and canonical link the
  shared fragment doesn't take params for. This is now a FOURTH page with
  that duplication; see fragments.html's comment on the SW-registration
  script for why (and grep for th:replace="~{fragments :: head(...)}"
  specifically, not just the string, to find every page needing it).

  The description below deliberately spells out "PDF" alongside the site
  name -- this page is the only place the original-edition PDF download
  lives, and matching that exact phrasing (title + meta description) is
  what search engines match against a "vino i gitare pdf" query.
-->
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{about.title} + ' - Vino i gitare'">About - Vino i gitare</title>
    <meta name="description" th:content="#{about.metaDescription}"/>
    <link rel="canonical" href="https://vinoigitare.com/about"/>
    <meta property="og:type" content="website"/>
    <meta property="og:site_name" content="Vino i gitare"/>
    <meta property="og:url" content="https://vinoigitare.com/about"/>
    <meta property="og:title" th:content="#{about.title}"/>
    <meta property="og:description" th:content="#{about.metaDescription}"/>
    <script>
        (function () {
            if (localStorage.getItem("vinoigitare.theme") === "dark") {
                document.documentElement.setAttribute("data-bs-theme", "dark");
            }
        })();
    </script>
    <meta name="i18n-theme-switch-to-dark" th:content="#{theme.switchToDark}"/>
    <meta name="i18n-theme-switch-to-light" th:content="#{theme.switchToLight}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment. -->
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/icons/favicon-32.png}"/>
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}"/>
    <link rel="manifest" th:href="@{/manifest.json}"/>
    <meta name="theme-color" content="#2f5d50"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment
         on the service-worker registration script; same "own <head>"
         duplication trap as the theme-restore script above. -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js");
            });
        }
    </script>
</head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <h1 class="h4 mb-3" th:text="#{about.title}">About</h1>

    <section class="mb-4">
        <h2 class="h6 text-uppercase text-muted mb-2" th:text="#{about.motivationHeading}">Why this exists</h2>
        <img th:src="@{/images/wine-and-guitar.jpg}" th:alt="#{about.motivationImageAlt}"
             class="img-fluid rounded mb-3" style="width: 100%; max-height: 320px; object-fit: cover;"/>
        <p th:text="#{about.motivationBody}">Motivation text.</p>
    </section>

    <!--
      Replaces the verbatim-Croatian foreword blockquote (2026-07-14):
      the original 2000 edition -- the physical/PDF songbook this whole
      project is modeled on -- is now offered as a direct download
      (pdf/Vino_i_gitare.pdf at the repo root, served from
      static/downloads/) rather than quoted inline.
    -->
    <section class="mb-4">
        <h2 class="h6 text-uppercase text-muted mb-2" th:text="#{about.originalEditionHeading}">Original 2000 edition</h2>
        <div class="d-flex flex-column flex-sm-row gap-3 align-items-center">
            <!-- Cropped from pdf/Vino_i_gitare.pdf.png (a full-page PDF-viewer
                 screenshot of the book's cover) down to just the cover
                 artwork itself. -->
            <img th:src="@{/images/vino-i-gitare-cover.png}" th:alt="#{about.originalEditionCoverAlt}"
                 width="160" class="border rounded" style="max-width: 160px; height: auto;"/>
            <div>
                <p th:text="#{about.originalEditionBody}">Placeholder original-edition text.</p>
                <a class="btn btn-outline-primary" th:href="@{/downloads/Vino_i_gitare.pdf}" th:text="#{about.downloadOriginalPdf}">Download the original PDF</a>
            </div>
        </div>
    </section>

    <section class="mb-4">
        <h2 class="h6 text-uppercase text-muted mb-2" th:text="#{about.installHeading}">Install and use offline</h2>
        <p th:text="#{about.installBody}">Placeholder install text.</p>
    </section>

    <section class="mb-4">
        <h2 class="h6 text-uppercase text-muted mb-2" th:text="#{about.privacyHeading}">Privacy</h2>
        <p th:text="#{about.privacyBody}">Placeholder privacy text.</p>
    </section>

    <section class="mb-4">
        <h2 class="h6 text-uppercase text-muted mb-2" th:text="#{about.supportHeading}">Support</h2>
        <p th:text="#{about.supportBody}">Placeholder support text.</p>
        <!--
          Plain static link (Nino's choice over Ko-fi's floating overlay
          widget, 2026-07-12) -- opens in a new tab so leaving to support
          the project never navigates the visitor away from the song
          they were reading. rel="noopener noreferrer": target="_blank"
          without it lets the opened page access window.opener and
          reach back into this one (a real, if obscure, security/privacy
          gap the "noopener" keyword exists specifically to close).
        -->
        <a class="btn btn-primary" href="https://ko-fi.com/ninosamac" target="_blank" rel="noopener noreferrer"
           th:text="#{about.supportButton}">Buy me a coffee</a>
    </section>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:src="@{/js/theme-toggle.js}"></script>
<script th:src="@{/js/preferences-menu.js}"></script>
</body>
</html>
