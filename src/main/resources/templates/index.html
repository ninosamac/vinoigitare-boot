<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<!--
  SEO (2026-07-12): this page writes its own <head> rather than going
  through fragments :: head(title) -- same reasoning as song.html's own
  comment on this: it needs a meta description and canonical link that
  most other pages don't, and changing the shared fragment's parameter
  list would touch every other page's template call site. A little
  markup duplication (viewport/theme-restore script/bootstrap+app.css)
  is the same trade-off already made there.
-->
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{home.pageTitle} + ' - Vino i gitare'">Vino i gitare</title>
    <meta name="description" th:content="#{home.metaDescription}"/>
    <link rel="canonical" href="https://vinoigitare.com/"/>
    <!-- Open Graph: not a Google ranking factor, but what Facebook/X/
         WhatsApp/Slack show in a link preview when this URL gets shared --
         worth having since that's a real, if indirect, traffic/backlink
         source for a brand-new site with nothing else pointing at it yet. -->
    <meta property="og:type" content="website"/>
    <meta property="og:site_name" content="Vino i gitare"/>
    <meta property="og:url" content="https://vinoigitare.com/"/>
    <meta property="og:title" th:content="#{home.pageTitle}"/>
    <meta property="og:description" th:content="#{home.metaDescription}"/>
    <script>
        (function () {
            if (localStorage.getItem("vinoigitare.theme") === "dark") {
                document.documentElement.setAttribute("data-bs-theme", "dark");
            }
        })();
    </script>
    <meta name="i18n-theme-switch-to-dark" th:content="#{theme.switchToDark}"/>
    <meta name="i18n-theme-switch-to-light" th:content="#{theme.switchToLight}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment. -->
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/icons/favicon-32.png}"/>
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}"/>
    <link rel="manifest" th:href="@{/manifest.json}"/>
    <meta name="theme-color" content="#2f5d50"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment
         on the service-worker registration script; same "own <head>"
         duplication trap as the theme-restore script above. -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js");
            });
        }
    </script>
</head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div class="d-flex justify-content-between align-items-baseline mb-1 flex-wrap">
        <h1 class="h4 mb-0" th:text="#{home.treeTitle}">Collection</h1>
        <span class="text-muted small" th:if="${totalArtists > 0}"
              th:text="#{home.treeStats(${totalArtists},${totalSongs})}">0 artists · 0 songs</span>
    </div>
    <div th:if="${totalArtists == 0}" class="text-muted mb-3">
        <span th:text="#{home.noSongs}">No songs yet. Add the first one in the</span>
        <a th:href="@{/admin/new}" th:text="#{home.adminPanel}">admin panel</a>.
    </div>

    <!--
      Homepage artist tree (rethinking the main page for scale -- see
      SongBrowseController's class Javadoc): a letter-grouped, expandable
      index instead of one flat list, artists as "folders" and songs as
      "files". Server-rendered fully expanded (aria-expanded="true", no
      hide-class on any .song-list) so it's a complete, navigable page
      with no JS at all; static/js/artist-tree.js collapses everything on
      load and layers on the actual expand/collapse/search interactivity
      described in the toolbar below -- that toolbar is inert without
      the script (search box does nothing, buttons do nothing), which is
      an acceptable no-JS degradation since every song is already visible
      without needing to search for it in that case.
    -->
    <div th:if="${totalArtists > 0}">
        <div class="tree-toolbar">
            <div class="tree-search-box">
                <input type="search" id="artistTreeFilter" class="form-control form-control-sm"
                       th:placeholder="#{home.filterPlaceholder}" autocomplete="off"/>
            </div>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="expandAllBtn"
                    th:text="#{home.expandAll}">Expand all</button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="collapseAllBtn"
                    th:text="#{home.collapseAll}">Collapse all</button>
        </div>
        <div class="tree-card">
            <div class="tree-scroll" id="artistTree">
                <div th:each="group : ${artistTree}">
                    <div class="letter-heading" th:text="${group.letter()}">A</div>
                    <div th:each="entry : ${group.artists()}">
                        <!--
                          The row itself is the toggle target (large, easy
                          to click/tap at any point along it) -- the artist
                          name is deliberately plain text here, not a link,
                          since a flex-grow link filling most of the row's
                          width left nowhere comfortable left to click for
                          toggling (a real bug, found live: clicks kept
                          landing on the link and navigating away instead
                          of expanding). The one real link in this row is
                          the small arrow at the end, to the existing
                          standalone artist page -- a deliberately small,
                          separate target, not competing with the toggle.
                        -->
                        <div class="artist-row" data-artist-row tabindex="0" role="button" aria-expanded="true">
                            <span class="twisty" aria-hidden="true">&#9654;</span>
                            <span class="folder-icon" aria-hidden="true">&#9638;</span>
                            <span class="artist-name" data-artist-name th:text="${entry.artist()}">Artist</span>
                            <span class="song-count" th:text="'(' + ${entry.songs().size()} + ')'">(0)</span>
                            <a class="artist-open-link" data-artist-open-link
                               th:href="@{/artists/{artist}(artist=${entry.artist()})}"
                               th:aria-label="#{home.viewArtistPage(${entry.artist()})}">&#8599;</a>
                        </div>
                        <div class="song-list" data-song-list>
                            <a class="song-row" th:each="song : ${entry.songs()}"
                               th:href="@{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}">
                                <span class="file-icon" aria-hidden="true">&#9834;</span>
                                <span class="song-title" data-song-title th:text="${song.title()}">Title</span>
                                <span class="song-views" th:text="${song.views()}">0</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tree-empty-state d-none" id="artistTreeEmptyState" th:text="#{home.noMatches}">
                No artists or songs match that filter.
            </div>
        </div>
    </div>
</main>
<script th:src="@{/js/theme-toggle.js}"></script>
<script th:src="@{/js/preferences-menu.js}"></script>
<script th:src="@{/js/artist-tree.js}"></script>
</body>
</html>
