<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{nav.artists})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <!-- Phase 4e: newest/popular, mirroring pesmarica.rs's homepage lists. -->
    <div class="row mb-4" th:if="${!newestSongs.isEmpty() or !popularSongs.isEmpty()}">
        <div class="col-md-6 mb-3 mb-md-0" th:if="${!newestSongs.isEmpty()}">
            <h2 class="h6 text-muted" th:text="#{home.newest}">Newest</h2>
            <ul class="list-unstyled">
                <li th:each="song : ${newestSongs}" class="index-row d-flex justify-content-between mb-2">
                    <a th:href="@{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}">
                        <span th:text="${song.artist()}">Artist</span> &ndash;
                        <span th:text="${song.title()}">Title</span>
                    </a>
                </li>
            </ul>
        </div>
        <div class="col-md-6" th:if="${!popularSongs.isEmpty()}">
            <h2 class="h6 text-muted" th:text="#{home.popular}">Most Popular</h2>
            <ul class="list-unstyled">
                <li th:each="song : ${popularSongs}" class="index-row d-flex justify-content-between mb-2">
                    <a th:href="@{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}">
                        <span th:text="${song.artist()}">Artist</span> &ndash;
                        <span th:text="${song.title()}">Title</span>
                    </a>
                    <span class="text-muted">(<span th:text="${song.views()}">0</span>)</span>
                </li>
            </ul>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-baseline mb-1 flex-wrap">
        <h1 class="h4 mb-0" th:text="#{home.artists}">Artists</h1>
        <span class="text-muted small" th:if="${totalArtists > 0}"
              th:text="#{home.treeStats(${totalArtists},${totalSongs})}">0 artists · 0 songs</span>
    </div>
    <div th:if="${totalArtists == 0}" class="text-muted mb-3">
        <span th:text="#{home.noSongs}">No songs yet. Add the first one in the</span>
        <a th:href="@{/admin/new}" th:text="#{home.adminPanel}">admin panel</a>.
    </div>

    <!--
      Homepage artist tree (rethinking the main page for scale -- see
      SongBrowseController's class Javadoc): a letter-grouped, expandable
      index instead of one flat list, artists as "folders" and songs as
      "files". Server-rendered fully expanded (aria-expanded="true",
      .song-list has no .collapsed class) so it's a complete, navigable
      page with no JS at all; static/js/artist-tree.js (added alongside
      the toolbar above it) then collapses everything on load and layers
      on the actual expand/collapse/search interactivity.
    -->
    <div class="tree-card" th:if="${totalArtists > 0}">
        <div class="tree-scroll" id="artistTree">
            <div th:each="group : ${artistTree}">
                <div class="letter-heading" th:text="${group.letter()}">A</div>
                <div th:each="entry : ${group.artists()}">
                    <div class="artist-row" data-artist-row tabindex="0" role="button" aria-expanded="true">
                        <span class="twisty" aria-hidden="true">&#9654;</span>
                        <span class="folder-icon" aria-hidden="true">&#9638;</span>
                        <a class="artist-name" data-artist-name
                           th:href="@{/artists/{artist}(artist=${entry.artist()})}"
                           th:text="${entry.artist()}">Artist</a>
                        <span class="song-count" th:text="'(' + ${entry.songs().size()} + ')'">(0)</span>
                    </div>
                    <div class="song-list" data-song-list>
                        <a class="song-row" th:each="song : ${entry.songs()}"
                           th:href="@{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}">
                            <span class="file-icon" aria-hidden="true">&#9834;</span>
                            <span class="song-title" data-song-title th:text="${song.title()}">Title</span>
                            <span class="song-views" th:text="${song.views()}">0</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script th:src="@{/js/theme-toggle.js}"></script>
</body>
</html>
