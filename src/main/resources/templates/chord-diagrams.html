<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(#{chordDiagrams.title})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <h1 class="h4 mb-1" th:text="#{chordDiagrams.title}">Chord Diagrams</h1>
    <p class="text-muted" th:text="#{chordDiagrams.intro}">Standard open-position fingerings for the seven natural chords, major and minor.</p>
    <div class="chord-diagram-grid">
        <div th:each="diagram : ${diagrams}" class="chord-diagram-card">
            <div class="chord-diagram-name" th:text="${diagram.name()}">C</div>
            <div th:utext="${diagram.svg()}"></div>
        </div>
    </div>
</main>
<script th:src="@{/js/theme-toggle.js}"></script>
</body>
</html>
