<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<!--
  SEO (2026-07-19): writes its own <head> rather than going through
  fragments :: head(title), same reasoning as index.html/song.html/
  song-live.html/about.html -- needs a meta description and canonical
  link the shared fragment doesn't take params for. This page was found
  missing both during an SEO check-up despite being genuinely valuable,
  evergreen content (a real "guitar chord diagrams" search candidate) --
  previously had neither, and wasn't in sitemap.xml either (see
  SitemapController).
-->
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{chordDiagrams.title} + ' - Vino i gitare'">Chord Diagrams - Vino i gitare</title>
    <meta name="description" th:content="#{chordDiagrams.metaDescription}"/>
    <link rel="canonical" href="https://vinoigitare.com/chord-diagrams"/>
    <meta property="og:type" content="website"/>
    <meta property="og:site_name" content="Vino i gitare"/>
    <meta property="og:url" content="https://vinoigitare.com/chord-diagrams"/>
    <meta property="og:title" th:content="#{chordDiagrams.title}"/>
    <meta property="og:description" th:content="#{chordDiagrams.metaDescription}"/>
    <script>
        (function () {
            var theme = localStorage.getItem("vinoigitare.theme");
            if (theme === "dark" || theme === "high-contrast") {
                document.documentElement.setAttribute("data-bs-theme", theme);
            }
            if (localStorage.getItem("vinoigitare.fontSize") === "large") {
                document.documentElement.setAttribute("data-font-size", "large");
            }
        })();
    </script>
    <meta name="i18n-font-size-enable-large" th:content="#{fontSize.enableLarge}"/>
    <meta name="i18n-font-size-disable-large" th:content="#{fontSize.disableLarge}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment. -->
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/icons/favicon-32.png}"/>
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}"/>
    <link rel="manifest" th:href="@{/manifest.json}"/>
    <meta name="theme-color" content="#2f5d50"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment
         on the service-worker registration script; same "own <head>"
         duplication trap as the theme-restore script above. -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js");
            });
        }
    </script>
</head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <h1 class="h4 mb-1" th:text="#{chordDiagrams.title}">Chord Diagrams</h1>
    <p class="text-muted" th:text="#{chordDiagrams.intro}">Standard open-position fingerings for the seven natural chords, major and minor.</p>
    <div th:replace="~{fragments :: chordDiagramSections(${sections}, true)}"></div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:src="@{/js/chord-audio.js}"></script>
<script th:src="@{/js/theme-toggle.js}"></script>
<script th:src="@{/js/font-size-toggle.js}"></script>
<script th:src="@{/js/preferences-menu.js}"></script>
</body>
</html>
