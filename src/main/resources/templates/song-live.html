<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<!--
  Phase 7: full-screen "performance view" -- minimal chrome (no navbar,
  no search box) and a larger default font, for actually playing a song
  off a music stand rather than reading it at a desk.

  Writes its own <head> rather than going through fragments :: head(title),
  same reasoning as song.html: this page needs several extra <meta> tags
  (auto-scroll labels, fullscreen labels) beyond that fragment's fixed
  (title) parameter, and changing that signature would touch every other
  caller (index/artist/search/admin/song all call it positionally).
-->
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${song.artist()} + ' - ' + ${song.title()} + ' - Vino i gitare'">Song - Vino i gitare</title>
    <!-- SEO (2026-07-19): this page is the exact same song's chords/lyrics
         as the real /akordi/{id}/{slug} page, just in a different (full-
         screen, minimal-chrome) layout for reading off a music stand --
         a canonical here tells search engines to treat the two as one
         page rather than duplicate content, without needing to block
         this one from being crawled or shared (it's a real, useful page
         on its own, just not the one that should rank). -->
    <link rel="canonical" th:href="'https://vinoigitare.com' + @{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}"/>
    <!-- Every page needs its own copy of this restore script if it doesn't
         go through fragments :: head -- see song.html's comment for the
         real bug this fixes (a stored theme choice being silently ignored
         on a page missing it). Large text is deliberately NOT restored
         here -- this page already has its own separate, bigger base font
         size (data-base-font-rem below) plus its own zoom stepper; layering
         the site-wide large-text multiplier on top would compound both,
         not match either's intent. -->
    <script>
        (function () {
            var theme = localStorage.getItem("vinoigitare.theme");
            if (theme === "dark" || theme === "high-contrast") {
                document.documentElement.setAttribute("data-bs-theme", theme);
            }
        })();
    </script>
    <meta name="i18n-auto-scroll-start" th:content="#{song.autoScrollStart}"/>
    <meta name="i18n-auto-scroll-stop" th:content="#{song.autoScrollStop}"/>
    <meta name="i18n-fullscreen-enter" th:content="#{song.fullscreenEnter}"/>
    <meta name="i18n-fullscreen-exit" th:content="#{song.fullscreenExit}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment. -->
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/icons/favicon-32.png}"/>
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}"/>
    <link rel="manifest" th:href="@{/manifest.json}"/>
    <meta name="theme-color" content="#2f5d50"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment
         on the service-worker registration script; same "own <head>"
         duplication trap as the theme-restore script above. -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js");
            });
        }
    </script>
    <!-- Duplicated from fragments :: head -- see that fragment's comment
         on the Cloudflare Web Analytics beacon; same "own <head>"
         duplication trap as the service-worker script above. -->
    <script type="module" src="https://static.cloudflareinsights.com/beacon.min.js"
            data-cf-beacon='{"token": "b24acf8d028c430697495321be1eede8"}'></script>
</head>
<!--
  data-base-font-rem: read by static/js/display-controls.js, which
  otherwise defaults to the normal song page's smaller base size -- see
  that file's comment. The font-size *step* itself still shares the one
  localStorage key the normal song page uses; only the starting point
  differs here.
-->
<body data-base-font-rem="1.6">
<!-- .container here for the same reason as fragments :: nav -- see that
     fragment's comment: keeps this bar's width matching the page content
     below it (<main class="container">) on wide screens instead of
     spanning the full viewport, while staying full-width on mobile. -->
<div class="live-bar container d-flex justify-content-between align-items-center py-2 no-print">
    <a class="live-bar-exit" th:href="@{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}"
       th:text="'&larr; ' + #{song.exitLiveView}">&larr; Exit live view</a>
    <div class="d-flex align-items-center gap-2">
        <button type="button" class="btn btn-sm btn-outline-light" data-fullscreen-toggle th:text="#{song.fullscreenEnter}">Fullscreen</button>
        <!-- Same three-option theme switch as the Preferences dropdown
             (fragments.html), just inline here since this page has no
             dropdown chrome at all -- see that fragment's comment. -->
        <div class="theme-switch" th:aria-label="#{preferences.theme}">
            <button type="button" class="btn btn-sm theme-toggle-btn" data-theme-option="light"
                    th:text="#{theme.light}">Light</button>
            <button type="button" class="btn btn-sm theme-toggle-btn" data-theme-option="dark"
                    th:text="#{theme.dark}">Dark</button>
            <button type="button" class="btn btn-sm theme-toggle-btn" data-theme-option="high-contrast"
                    th:text="#{theme.highContrast}">High Contrast</button>
        </div>
    </div>
</div>
<main class="container">
    <!-- Same control rows and data-* attributes as song.html, verbatim --
         transpose.js/display-controls.js don't care which page they're on.
         Stacked one group per row (not Transpose+Zoom sharing one row) and
         using the same .control-label/.control-step-btn column-alignment
         classes, matching the fix applied to the normal song page -- see
         app.css's comment on those classes for why. No Live view button
         here (you're already in live view), so the Zoom row has nothing
         at its right; Auto-scroll's toggle still sits at the right of its
         own row, same as song.html. -->
    <div class="d-flex flex-wrap align-items-center gap-2 mb-2 mt-2 no-print">
        <span class="text-muted small control-label" th:text="#{song.transpose}">Transpose:</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-transpose-down th:aria-label="#{song.transposeDown}">&minus;</button>
        <span data-transpose-display class="fw-semibold" style="min-width: 2em; text-align: center;">0</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-transpose-up th:aria-label="#{song.transposeUp}">+</button>
    </div>

    <div class="d-flex flex-wrap align-items-center gap-2 mb-2 no-print">
        <span class="text-muted small control-label" th:text="#{song.fontSize}">Zoom:</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-font-decrease th:aria-label="#{song.fontSmaller}">A&minus;</button>
        <span data-font-display class="fw-semibold" style="min-width: 2em; text-align: center;">0</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-font-increase th:aria-label="#{song.fontLarger}">A+</button>
    </div>

    <div class="d-flex flex-wrap align-items-center gap-2 mb-3 no-print">
        <span class="text-muted small control-label" th:text="#{song.autoScroll}">Auto-scroll:</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-scroll-slower th:aria-label="#{song.scrollSlower}">&minus;</button>
        <span data-scroll-speed-display class="fw-semibold" style="min-width: 2em; text-align: center;">3</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-scroll-faster th:aria-label="#{song.scrollFaster}">+</button>
        <button type="button" class="btn btn-outline-primary btn-sm ms-auto" data-scroll-toggle aria-pressed="false" th:text="#{song.autoScrollStart}">Auto-scroll</button>
    </div>

    <!-- th:with on its own wrapper element, not the th:replace element itself --
         see song.html's comment: th:replace runs before a same-element th:with
         would be in scope. -->
    <div th:with="highlightedChords=${@chordLineHighlighter.render(song.chords())}">
        <div th:replace="~{fragments :: songContent(${song}, ${highlightedChords})}"></div>
    </div>
</main>
<script th:src="@{/js/transpose.js}"></script>
<script th:src="@{/js/display-controls.js}"></script>
<script th:src="@{/js/theme-toggle.js}"></script>
<script th:src="@{/js/live-view.js}"></script>
</body>
</html>
