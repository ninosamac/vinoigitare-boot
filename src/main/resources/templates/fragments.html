<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<!--
  Shared fragments (head + nav) included by every page via
  th:replace="~{fragments :: head('Page title')}" / th:replace="~{fragments :: nav}".
  No layout-dialect dependency needed for a handful of pages this simple.
-->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' - Vino i gitare'">Vino i gitare</title>
    <!-- Real logo assets (logo/ at repo root), not placeholders -- also
         duplicated into index.html/song.html/song-live.html/about.html's
         own <head>, same trap as the SW registration script below. -->
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/icons/favicon-32.png}"/>
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}"/>
    <link rel="manifest" th:href="@{/manifest.json}"/>
    <meta name="theme-color" content="#2f5d50"/>
    <!--
      Applies a stored dark override (if any) to <html> before first paint
      -- inline and synchronous, not in theme-toggle.js (which loads at
      the end of <body>), specifically so there's no flash of dark while
      that loads. No stored value = light, always -- there's no
      prefers-color-scheme detection; the theme only ever changes via the
      toggle button, on purpose (see theme-toggle.js's header comment for
      why that changed from the first version of this feature).

      IMPORTANT if you're duplicating this script elsewhere (song.html
      has its own copy, since it doesn't use this fragment's <head> --
      see its comment for why): every page needs this, not just the ones
      that go through this fragment, or a stored dark preference will be
      silently ignored on any page missing it -- exactly the bug this
      script's introduction into song.html separately was fixing.
    -->
    <script>
        (function () {
            if (localStorage.getItem("vinoigitare.theme") === "dark") {
                document.documentElement.setAttribute("data-bs-theme", "dark");
            }
        })();
    </script>
    <!-- Read by static/js/theme-toggle.js, same reasoning as the
         auto-scroll button's i18n-* meta tags in song.html: the toggle's
         label/aria-label text depends on which theme is CURRENTLY active,
         and plain JS has no access to Spring's MessageSource to look that
         up itself. -->
    <meta name="i18n-theme-switch-to-dark" th:content="#{theme.switchToDark}"/>
    <meta name="i18n-theme-switch-to-light" th:content="#{theme.switchToLight}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <!--
      offline-support-plan.md. Registers static/sw.js, which then caches
      song pages as they're visited (stale-while-revalidate) so they stay
      readable offline. Deferred to the load event so it never competes
      with this page's own resources; feature-detected since older
      browsers have no navigator.serviceWorker.

      Duplicated verbatim into index.html, song.html, song-live.html, and
      (2026-07-15, for its own meta description/canonical) about.html's own
      <head> (same reasoning, and same trap, as the theme-restore script
      above -- those four pages write their own head instead of using this
      fragment). Missing it on index.html once already, caught by driving
      a real browser against it -- grepping for the literal
      th:replace="~{fragments :: head(...)}" call, not just the string
      "fragments :: head" (several of these pages' own-head comments
      mention that string without using it), is what actually finds every
      page needing this.
    -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js");
            });
        }
    </script>
</head>
<body>
<!--
  Real feedback: on an ultra-wide monitor, a full-bleed .container-fluid
  navbar reads as much wider than the page content below it (<main
  class="container">), which caps out at a fixed max-width. Using
  .container directly on <nav> itself (not as a nested wrapper div, the
  usual Bootstrap pattern) makes the whole bar -- background included --
  match that same max-width and center the same way, on every page, while
  staying full-width below the sm breakpoint exactly like the page
  content does (.container has no max-width at all until sm, so mobile is
  unaffected). This works without any extra flex utility classes because
  .navbar's own base rules already set display:flex/flex-wrap/align-items/
  justify-content -- that's normally only applied a second time to a
  nested .container child; putting .container straight on the .navbar
  element means it already has everything it needs from the one rule.
-->
<nav th:fragment="nav" class="navbar navbar-expand navbar-dark mb-3 container">
    <!--
      Real logo lockup (logo/lockup-dark.png at the repo root) in place of
      a plain "Home" text link -- cropped to just the mark + wordmark (the
      "CHORDS - LYRICS - TABS" tagline underneath didn't fit legibly at
      navbar height) and its near-black background keyed to transparent.
      Deliberately always the -dark lockup variant, in both site themes:
      the navbar itself is a fixed dark "ink bar" regardless of light/dark
      mode (see this fragment's own comment above on --nav-bg), so the
      light-background lockup would show a visible mismatched rectangle
      here -- transparency is what actually makes it theme-independent,
      not swapping files per theme.
    -->
    <a class="navbar-brand me-2 py-0" th:href="@{/}">
        <img th:src="@{/images/nav-brand.png}" th:alt="#{nav.home}" style="height: 36px; width: auto;"/>
    </a>
    <!--
      Search box, submits GET /search?q=... (SearchController). Present
      in every page via this shared fragment. th:value falls back to
      empty when the current page has no "query" model attribute
      (Thymeleaf evaluates an undefined variable to null, not an error).
    -->
    <form class="d-flex flex-grow-1 order-3 order-md-0 mt-2 mt-md-0 mx-md-3" style="max-width: 360px;"
          th:action="@{/search}" method="get" role="search">
        <input class="form-control form-control-sm" type="search" name="q"
               th:placeholder="#{search.placeholder}" th:value="${query != null ? query : ''}"/>
    </form>
    <div class="navbar-nav flex-row align-items-center">
        <a class="nav-link me-2" th:href="@{/chord-diagrams}" th:text="#{nav.chordDiagrams}">Chords</a>
        <a class="nav-link me-2" th:href="@{/about}" th:text="#{nav.about}">About</a>
        <a class="nav-link me-2" th:href="@{/admin}" th:text="#{nav.admin}">Admin</a>
        <!--
          Preferences dropdown (2026-07-12): the theme toggle and language
          switcher used to be two separate always-visible nav controls --
          consolidated into one button + a small anchored dropdown panel
          (not a modal/full-screen popup, deliberately -- see
          static/js/preferences-menu.js's header comment), so the navbar
          itself only has one extra item instead of four.

          static/js/preferences-menu.js owns open/close/outside-click/
          escape-key handling only. The actual controls inside are
          untouched: static/js/theme-toggle.js still just looks up
          [data-theme-toggle] wherever that button now lives, and the
          language links are still plain "?lang=xx" anchor navigation,
          not JS -- see the original comment on that (kept below) for why
          a bare query-only href is used rather than a Thymeleaf @{...} URL.
        -->
        <div class="preferences" data-preferences>
            <button type="button" class="nav-link me-2 preferences-toggle-btn" data-preferences-toggle
                    aria-haspopup="true" aria-expanded="false" th:text="#{nav.user}">User</button>
            <div class="preferences-panel" data-preferences-panel hidden>
                <div class="preferences-row">
                    <span class="preferences-label" th:text="#{preferences.theme}">Theme</span>
                    <!--
                      static/js/theme-toggle.js sets the glyph/aria-label on
                      load (reflecting whatever theme is actually active,
                      whether that came from the stored override above or
                      prefers-color-scheme) and again on every click.
                    -->
                    <button type="button" class="btn btn-sm theme-toggle-btn" data-theme-toggle>&#9789;</button>
                </div>
                <div class="preferences-row">
                    <span class="preferences-label" th:text="#{preferences.language}">Language</span>
                    <!--
                      A bare "?lang=xx" href, not th:href="@{...(lang=xx)}"
                      -- a query-only href is resolved by the browser
                      against the CURRENT page, so switching language on a
                      song page stays on that song page. The one tradeoff:
                      it replaces the whole query string, so switching
                      language while on a search-results page (?q=...) does
                      lose that query -- accepted as a minor, rare edge
                      case rather than threading the current query string
                      through every page's own template just to preserve it.
                    -->
                    <div class="lang-switch" aria-label="Language">
                        <a href="?lang=en" class="lang-link" th:classappend="${#locale.language == 'en'} ? ' active'">EN</a>
                        <a href="?lang=hr" class="lang-link" th:classappend="${#locale.language == 'hr'} ? ' active'">HR</a>
                        <a href="?lang=sr" class="lang-link" th:classappend="${#locale.language == 'sr'} ? ' active'">SR</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<!--
  Included via th:replace="~{fragments :: footer}" near the end of <body>
  on every page except song-live.html (full-screen performance view --
  deliberately no chrome at all, see its own comment) and song-pdf.html
  (printed/PDF output, not a browser page).
-->
<footer th:fragment="footer" class="container text-center text-muted small py-3 mt-4 border-top">
    <p class="mb-0" th:text="#{footer.copyright(${#calendars.format(#calendars.createNow(), 'yyyy')})}">&copy; 2026 Vino i gitare. All rights reserved.</p>
</footer>

<!--
  Song title/artist/chords block, shared between the on-screen song page
  (song.html) and the print-oriented PDF template (song-pdf.html) so the
  chords-rendering markup exists in exactly one place.

  Note: this file's comments must avoid a literal double hyphen, same
  restriction as song-pdf.html's own note below explains; this fragment
  is reused by that PDF template, and openhtmltopdf's strict XML parser
  rejects two consecutive hyphens in a comment anywhere in the final
  rendered document, which includes text pulled in from here.

  Takes the already-highlighted chords HTML as a parameter (highlightedChords)
  rather than computing it in here via song.chords(): Thymeleaf restricts
  T()/new/@bean access to everything inside a fragment inserted via
  th:replace/th:insert, not just the call-site argument list ("Instantiation
  of new objects and access to static classes or parameters is forbidden in
  this context"), so @chordLineHighlighter.render(...) has to be evaluated
  by the calling template (song.html / song-pdf.html), in their own
  unrestricted context, and handed in as a plain variable.

  th:utext (not th:text) on that variable: ChordLineHighlighter wraps
  detected chord lines in <span class="chord-line"> so CSS can tint them,
  so it's real HTML, not plain text Thymeleaf would auto-escape; the
  highlighter itself does the escaping (song.chords() is user-editable
  admin-form content, not trusted markup; see that class's Javadoc).
  Whitespace/newlines are still preserved exactly; see song.html's
  comment for why that matters.
-->
<div th:fragment="songContent(song, highlightedChords)">
    <h1 class="song-title h4 mb-0" th:text="${song.title()}">Title</h1>
    <h2 class="song-artist h6 text-muted" th:text="${song.artist()}">Artist</h2>
    <!--
      data-original-chords holds the untouched, unhighlighted chords text
      for static/js/transpose.js to recompute from on every +/- click (see
      song.html); it applies the same chord-line-detection heuristic
      itself to re-wrap the transposed text. Harmless no-op on the PDF
      template (song-pdf.html), which reuses this same fragment but never
      loads any JS.
    -->
    <pre class="song-chords" th:utext="${highlightedChords}"
         th:attr="data-original-chords=${song.chords()}">Chords go here.</pre>
</div>

<!--
  Shared between the on-screen /chord-diagrams page and the personalized
  songbook PDF's chord-reference section (2026-07-15) -- extracted so the
  section/diagram markup isn't duplicated between the two. sections is a
  List<com.vinoigitare.chords.RenderedChordSection>, already rendered to
  SVG in plain Java by whichever controller/renderer calls this (same
  Thymeleaf restricted-expression reasoning as songContent above -- see
  ChordDiagramController's own comment on this).
-->
<div th:fragment="chordDiagramSections(sections)">
    <div th:each="section : ${sections}" class="chord-diagram-section">
        <h2 class="chord-diagram-section-heading" th:text="#{${section.labelKey()}}">Section</h2>
        <div class="chord-diagram-grid">
            <div th:each="diagram : ${section.diagrams()}" class="chord-diagram-card">
                <div class="chord-diagram-name" th:text="${diagram.name()}">C</div>
                <div th:utext="${diagram.svg()}"></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
