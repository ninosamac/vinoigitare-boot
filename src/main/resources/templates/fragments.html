<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Shared fragments (head + nav) included by every page via
  th:replace="~{fragments :: head('Page title')}" / th:replace="~{fragments :: nav}".
  No layout-dialect dependency needed for a handful of pages this simple.
-->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' - Vino i gitare'">Vino i gitare</title>
    <!--
      Applies a stored dark override (if any) to <html> before first paint
      -- inline and synchronous, not in theme-toggle.js (which loads at
      the end of <body>), specifically so there's no flash of dark while
      that loads. No stored value = light, always -- there's no
      prefers-color-scheme detection; the theme only ever changes via the
      toggle button, on purpose (see theme-toggle.js's header comment for
      why that changed from the first version of this feature).

      IMPORTANT if you're duplicating this script elsewhere (song.html
      has its own copy, since it doesn't use this fragment's <head> --
      see its comment for why): every page needs this, not just the ones
      that go through this fragment, or a stored dark preference will be
      silently ignored on any page missing it -- exactly the bug this
      script's introduction into song.html separately was fixing.
    -->
    <script>
        (function () {
            if (localStorage.getItem("vinoigitare.theme") === "dark") {
                document.documentElement.setAttribute("data-bs-theme", "dark");
            }
        })();
    </script>
    <!-- Read by static/js/theme-toggle.js, same reasoning as the
         auto-scroll button's i18n-* meta tags in song.html: the toggle's
         label/aria-label text depends on which theme is CURRENTLY active,
         and plain JS has no access to Spring's MessageSource to look that
         up itself. -->
    <meta name="i18n-theme-switch-to-dark" th:content="#{theme.switchToDark}"/>
    <meta name="i18n-theme-switch-to-light" th:content="#{theme.switchToLight}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav th:fragment="nav" class="navbar navbar-expand navbar-dark mb-3">
    <div class="container-fluid flex-wrap">
        <a class="navbar-brand brand-mark" th:href="@{/}">Vino i gitare</a>
        <!--
          Search box, submits GET /search?q=... (SearchController). Present
          in every page via this shared fragment. th:value falls back to
          empty when the current page has no "query" model attribute
          (Thymeleaf evaluates an undefined variable to null, not an error).
        -->
        <form class="d-flex flex-grow-1 order-3 order-md-0 mt-2 mt-md-0 mx-md-3" style="max-width: 360px;"
              th:action="@{/search}" method="get" role="search">
            <input class="form-control form-control-sm" type="search" name="q"
                   th:placeholder="#{search.placeholder}" th:value="${query != null ? query : ''}"/>
        </form>
        <div class="navbar-nav flex-row align-items-center">
            <a class="nav-link me-2" th:href="@{/}" th:text="#{nav.artists}">Artists</a>
            <a class="nav-link me-2" th:href="@{/genres}" th:text="#{nav.genres}">Genres</a>
            <a class="nav-link me-2" th:href="@{/chord-diagrams}" th:text="#{nav.chordDiagrams}">Chords</a>
            <a class="nav-link me-2" th:href="@{/admin}" th:text="#{nav.admin}">Admin</a>
            <!--
              static/js/theme-toggle.js sets the glyph/aria-label on load
              (reflecting whatever theme is actually active, whether that
              came from the stored override above or prefers-color-scheme)
              and again on every click.
            -->
            <button type="button" class="btn btn-sm theme-toggle-btn" data-theme-toggle>&#9789;</button>
        </div>
    </div>
</nav>

<!--
  Song title/artist/chords block, shared between the on-screen song page
  (song.html) and the print-oriented PDF template (song-pdf.html) so the
  chords-rendering markup exists in exactly one place.

  Note: this file's comments must avoid a literal double hyphen, same
  restriction as song-pdf.html's own note below explains; this fragment
  is reused by that PDF template, and openhtmltopdf's strict XML parser
  rejects two consecutive hyphens in a comment anywhere in the final
  rendered document, which includes text pulled in from here.

  Takes the already-highlighted chords HTML as a parameter (highlightedChords)
  rather than computing it in here via song.chords(): Thymeleaf restricts
  T()/new/@bean access to everything inside a fragment inserted via
  th:replace/th:insert, not just the call-site argument list ("Instantiation
  of new objects and access to static classes or parameters is forbidden in
  this context"), so @chordLineHighlighter.render(...) has to be evaluated
  by the calling template (song.html / song-pdf.html), in their own
  unrestricted context, and handed in as a plain variable.

  th:utext (not th:text) on that variable: ChordLineHighlighter wraps
  detected chord lines in <span class="chord-line"> so CSS can tint them,
  so it's real HTML, not plain text Thymeleaf would auto-escape; the
  highlighter itself does the escaping (song.chords() is user-editable
  admin-form content, not trusted markup; see that class's Javadoc).
  Whitespace/newlines are still preserved exactly; see song.html's
  comment for why that matters.
-->
<div th:fragment="songContent(song, highlightedChords)">
    <h1 class="song-title h4 mb-0" th:text="${song.title()}">Title</h1>
    <h2 class="song-artist h6 text-muted" th:text="${song.artist()}">Artist</h2>
    <!--
      data-original-chords holds the untouched, unhighlighted chords text
      for static/js/transpose.js to recompute from on every +/- click (see
      song.html); it applies the same chord-line-detection heuristic
      itself to re-wrap the transposed text. Harmless no-op on the PDF
      template (song-pdf.html), which reuses this same fragment but never
      loads any JS.
    -->
    <pre class="song-chords" th:utext="${highlightedChords}"
         th:attr="data-original-chords=${song.chords()}">Chords go here.</pre>
</div>
</body>
</html>
