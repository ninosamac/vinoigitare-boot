<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${song.title()})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <p class="no-print">
        <a th:href="@{/artists/{artist}(artist=${song.artist()})}" th:text="'&larr; ' + ${song.artist()}">&larr; Artist</a>
    </p>

    <div th:replace="~{fragments :: songContent(${song})}"></div>

    <div class="mt-3 no-print">
        <a class="btn btn-outline-primary btn-sm" th:href="@{/akordi/{id}/pdf(id=${song.id()})}">Preuzmi PDF</a>
        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="window.print()">Štampaj</button>
    </div>
</main>
</body>
</html>
