<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!--
  Phase 4f (SEO): this page writes its own <head> rather than going
  through fragments :: head(title) -- it needs a meta description and a
  canonical link that no other page needs, and changing the shared
  fragment's parameter list would risk every other page's template call
  site (index/artist/search/admin all call it positionally).
  A little markup duplication (viewport/bootstrap/app.css, same as
  fragments :: head) is the safer trade-off.
-->
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${song.artist()} + ' - ' + ${song.title()} + ' - Vino i gitare'">Song - Vino i gitare</title>
    <!--
      Real bug found in testing: this page has its own <head> (see the
      comment above) instead of going through fragments :: head(title),
      so it was missing the theme-restore script that fragment carries --
      meaning a stored dark/light choice was silently ignored on every
      song page, falling back to default (previously prefers-color-scheme,
      now always light) instead. Every page needs this script, so it's
      duplicated here rather than only living in the shared fragment.
    -->
    <script>
        (function () {
            var stored = localStorage.getItem("vinoigitare.theme");
            if (stored === "dark") {
                document.documentElement.setAttribute("data-bs-theme", "dark");
            }
        })();
    </script>
    <!-- Read by static/js/display-controls.js so the auto-scroll toggle's
         start/stop button text comes from the message bundle instead of
         being hardcoded in JS, which has no access to Thymeleaf messages. -->
    <meta name="i18n-auto-scroll-start" th:content="#{song.autoScrollStart}"/>
    <meta name="i18n-auto-scroll-stop" th:content="#{song.autoScrollStop}"/>
    <meta name="description" th:content="${metaDescription}"/>
    <!-- Absolute, not relative -- Google tolerates a relative canonical
         but recommends absolute for clarity; cheap to get right since the
         domain is a fixed, known value. -->
    <link rel="canonical" th:href="'https://vinoigitare.com' + @{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}"/>
    <!-- Open Graph -- see index.html's comment on why this is worth
         having even though it's not a Google ranking factor. -->
    <meta property="og:type" content="music.song"/>
    <meta property="og:site_name" content="Vino i gitare"/>
    <meta property="og:url" th:content="'https://vinoigitare.com' + @{/akordi/{id}/{slug}(id=${song.id()},slug=${song.slug()})}"/>
    <meta property="og:title" th:content="${song.artist()} + ' - ' + ${song.title()}"/>
    <meta property="og:description" th:content="${metaDescription}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment. -->
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/icons/favicon-32.png}"/>
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}"/>
    <link rel="manifest" th:href="@{/manifest.json}"/>
    <meta name="theme-color" content="#2f5d50"/>
    <!-- Duplicated from fragments :: head -- see that fragment's comment
         on the service-worker registration script; same "own <head>"
         duplication trap as the theme-restore script above. -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js");
            });
        }
    </script>
</head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <p class="no-print">
        <a th:href="@{/artists/{artist}(artist=${song.artist()})}" th:text="'&larr; ' + ${song.artist()}">&larr; Artist</a>
    </p>

    <!--
      Transpose controls (Phase 4b): buttons re-render the .song-chords
      <pre> below via static/js/transpose.js, recomputing from
      data-original-chords each click (see that file's header comment for
      why). No page reload, no server round-trip -- the server-side
      equivalent (com.vinoigitare.chords.ChordTransposer) only comes into
      play for the PDF download, via the ?transpose= query param this JS
      appends to the "Preuzmi PDF" link below.
    -->
    <!-- Each control group gets its own row (was Transpose + Zoom sharing
         one row, which wrapped mid-group on narrow phones -- e.g. "A+"
         landing alone on its own line around 390px wide). -->
    <div class="d-flex flex-wrap align-items-center gap-2 mb-2 no-print">
        <span class="text-muted small control-label" th:text="#{song.transpose}">Transpose:</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-transpose-down th:aria-label="#{song.transposeDown}">&minus;</button>
        <span data-transpose-display class="fw-semibold" style="min-width: 2em; text-align: center;">0</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-transpose-up th:aria-label="#{song.transposeUp}">+</button>
    </div>

    <!--
      Font size + auto-scroll controls (Phase 4d): static/js/display-
      controls.js. Both preferences persist in localStorage; whether
      auto-scroll is currently running does not (see that file's
      header comment).

      Live view/Auto-scroll toggle (Phase 7) sit at the right of their
      matching row (ms-auto pushes them there within the same flex row)
      rather than a separate row -- they're the "hands-free reading"
      actions for the setting immediately to their left (zoom, then
      scroll speed), so this keeps each one visually paired with the
      control it actually affects rather than grouping them with each
      other display-wise.
    -->
    <div class="d-flex flex-wrap align-items-center gap-2 mb-2 no-print">
        <span class="text-muted small control-label" th:text="#{song.fontSize}">Zoom:</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-font-decrease th:aria-label="#{song.fontSmaller}">A&minus;</button>
        <span data-font-display class="fw-semibold" style="min-width: 2em; text-align: center;">0</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-font-increase th:aria-label="#{song.fontLarger}">A+</button>
        <a class="btn btn-outline-primary btn-sm ms-auto" th:href="@{/akordi/{id}/live(id=${song.id()})}" th:text="#{song.liveView}">Live view</a>
    </div>

    <div class="d-flex flex-wrap align-items-center gap-2 mb-3 no-print">
        <span class="text-muted small control-label" th:text="#{song.autoScroll}">Auto-scroll:</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-scroll-slower th:aria-label="#{song.scrollSlower}">&minus;</button>
        <span data-scroll-speed-display class="fw-semibold" style="min-width: 2em; text-align: center;">3</span>
        <button type="button" class="btn btn-outline-secondary btn-sm control-step-btn" data-scroll-faster th:aria-label="#{song.scrollFaster}">+</button>
        <button type="button" class="btn btn-outline-primary btn-sm ms-auto" data-scroll-toggle aria-pressed="false" th:text="#{song.autoScrollStart}">Auto-scroll</button>
    </div>

    <!--
      th:with and th:replace can't go on the SAME element here: th:replace
      has higher precedence (runs first) in Thymeleaf's standard attribute
      processing order, so by the time it evaluates its own expression the
      th:with variable on that same tag isn't in scope yet -- it silently
      resolves to null rather than erroring, so the fragment call site
      needs its own wrapper element with the th:with, one level out.
    -->
    <div th:with="highlightedChords=${@chordLineHighlighter.render(song.chords())}">
        <div th:replace="~{fragments :: songContent(${song}, ${highlightedChords})}"></div>
    </div>

    <div class="mt-3 no-print">
        <a class="btn btn-outline-primary btn-sm" data-pdf-link
           th:href="@{/akordi/{id}/pdf(id=${song.id()})}"
           th:attr="data-pdf-base-href=@{/akordi/{id}/pdf(id=${song.id()})}" th:text="#{song.downloadPdf}">Download PDF</a>
        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="window.print()" th:text="#{song.print}">Print</button>
        <!--
          Personalized songbook PDF, Phase A (admin-gated -- see
          ~/knowledge/projects/vinoigitare/personalized-songbook-pdf-plan.md):
          sec:authorize-gated the same way the Edit/Delete span below is,
          deliberately hiding this from the general public entirely for
          now, not just gating the /songbook routes themselves -- an
          anonymous visitor clicking "Add to my songbook" only to hit a
          login wall at "Generate PDF" would be a confusing, broken-looking
          experience for a feature that isn't public yet.
        -->
        <span sec:authorize="isAuthenticated()">
            <button type="button" class="btn btn-outline-secondary btn-sm" data-songbook-toggle
                    th:attr="data-song-id=${song.id()}" th:data-label-add="#{songbook.addToSongbook}"
                    th:data-label-remove="#{songbook.removeFromSongbook}" th:text="#{songbook.addToSongbook}">Add to my songbook</button>
        </span>
        <!-- Admin-only, reusing AdminController's existing edit/delete
             routes and the same admin.edit/admin.delete/admin.confirmDelete
             message keys and data-delete-form confirmation convention as
             admin/list.html (see static/js/delete-confirm.js) -- this is
             just a second, in-context place to reach them while reading a
             song, not a new capability. sec:authorize reads the same
             session Spring Security already tracks (only /admin/** routes
             are actually gated, per SecurityConfig, so an admin who has
             logged in stays "authenticated" on every public page too). -->
        <span sec:authorize="isAuthenticated()">
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/edit/{id}(id=${song.id()})}" th:text="#{admin.edit}">Edit</a>
            <form th:action="@{/admin/delete/{id}(id=${song.id()})}" method="post" class="d-inline"
                  th:attr="data-confirm-delete=#{admin.confirmDelete}" data-delete-form>
                <button type="submit" class="btn btn-outline-danger btn-sm" th:text="#{admin.delete}">Delete</button>
            </form>
        </span>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:src="@{/js/transpose.js}"></script>
<script th:src="@{/js/display-controls.js}"></script>
<script th:src="@{/js/delete-confirm.js}"></script>
<script sec:authorize="isAuthenticated()" th:src="@{/js/songbook.js}"></script>
<script th:src="@{/js/theme-toggle.js}"></script>
<script th:src="@{/js/preferences-menu.js}"></script>
</body>
</html>
