<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${genre.label()})}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <p><a th:href="@{/genres}" th:text="'&larr; ' + #{genre.allGenres}">&larr; All genres</a></p>
    <h1 class="h4 mb-1" th:text="${genre.label()}">Genre</h1>
    <p class="text-muted" th:text="#{genre.songCount(${songCount})}">0 songs</p>

    <div th:if="${letters.isEmpty()}" class="text-muted" th:text="#{genre.noSongsInGenre}">No songs in this genre yet.</div>
    <div class="d-flex flex-wrap gap-2">
        <a th:each="letter : ${letters}"
           th:href="@{/genres/{slug}/{letter}(slug=${genre.slug()},letter=${letter})}"
           th:text="${letter}"
           class="btn btn-outline-secondary btn-sm">A</a>
    </div>
</main>
<script th:src="@{/js/theme-toggle.js}"></script>
</body>
</html>
