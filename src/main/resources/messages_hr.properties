# Croatian bundle. Written for the real language switcher (2026-07-12,
# see LocaleConfig) -- unlike messages_sr.properties (kept from Phases
# 0-4, sitting unused until this switcher existed), this one was written
# as a genuine, natural Croatian translation from the start, not a
# mechanical ijekavica/vocabulary swap over the Serbian text -- though
# the two do overlap heavily given how closely related the languages
# are. Keys match messages.properties one-for-one.

