about.title=O stranici
about.motivationHeading=Zašto ovo postoji
about.motivationImageAlt=Električna gitara, čaša vina i ručno pisane note na drvenom stolu
about.motivationBody=Vino i gitare nastalo je kao osobni projekt digitalizacije sveske akorda i tekstova pjesama koju koristim godinama uz prijatelje, kako bi bilo lako pregledavati, tražiti i svirati odakle god -- uključujući i mobitel. Ovo je hobi projekt kojeg vodi jedna osoba, a osnovna zbirka ostaje besplatna za korištenje.
about.originalEditionHeading=Izvorno izdanje iz 2000. godine
about.originalEditionBody=Vino i gitare nastalo je kao fizička/PDF zbirka pjesama, napisana i ručno sastavljena 2000. godine. Original je sačuvan u potpunosti onakav kakav je bio -- predgovor, izgled, sve.
about.downloadOriginalPdf=Preuzmi izvorni PDF
about.originalEditionCoverAlt=Naslovnica izvornog izdanja knjige Vino i gitare iz 2000. godine

about.installHeading=Instalacija i rad bez interneta
about.installBody=Vino i gitare možete instalirati kao pravu aplikaciju: na računalu potražite ikonu za instalaciju u adresnoj traci preglednika; na Androidu koristite "Dodaj na početni zaslon" u izborniku preglednika; na iPhoneu/iPadu koristite Safarijev gumb Podijeli i "Dodaj na početni zaslon" (instalacija na iOS-u radi samo iz Safarija). Nakon instalacije, svaka pjesma koju ste otvorili dok ste bili online ostaje čitljiva i bez internetske veze -- korisno usred svirke bez signala. Pretraga, admin i preuzimanje PDF-a i dalje trebaju vezu.
about.privacyHeading=Privatnost
about.privacyBody=Ova stranica nema korisničke račune, ne koristi kolačiće za praćenje i nema analitiku. Broj pregleda pjesme jednostavan je zbirni broj, bez veze s bilo kojim posjetiteljem ili uređajem. Postavka svijetle/tamne teme sprema se samo u vašem pregledniku i nikada se ne šalje na poslužitelj. Gumb za podršku ispod obična je poveznica na Ko-fi (otvara se u novoj kartici) -- ništa se ne učitava s Ko-fi stranice na ovoj stranici, no Ko-fi ima svoju vlastitu politiku privatnosti kada tamo stignete.
about.supportHeading=Podrška
about.supportBody=Ako uživate u ovoj zbirci i želite pomoći da ostane aktivna, možete me častiti kavom.
about.supportButton=Časti me kavom

offline.title=Bez internetske veze
offline.heading=Bez internetske veze
offline.body=Ova stranica još nije bila učitana, pa nema ništa spremljeno za prikaz. Pjesme koje ste već otvorili dok ste bili online ostaju dostupne bez veze -- za sve ostalo, ponovno se spojite i pokušajte opet.
