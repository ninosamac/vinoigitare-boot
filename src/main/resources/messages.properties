# All content here is now real, final copy -- see
# about-page-and-genre-removal-plan.md. The Ko-fi link (about.html) was
# the last placeholder; confirmed 2026-07-12 (ko-fi.com/ninosamac, a
# plain link over the floating overlay widget).
about.title=About
about.metaDescription=Vino i gitare is a free online songbook of guitar chords and tabs for ex-Yugoslav songs. Download the original Vino i gitare PDF songbook (2000 edition), or browse and search chords online -- works offline once installed.
about.motivationHeading=Why this exists
about.motivationImageAlt=An electric guitar, a glass of wine, and hand-written sheet music on a wooden table
about.motivationBody=Vino i gitare started as a personal project to digitize a songbook of guitar chords and lyrics used for years of playing with friends, so it's easy to browse, search, and play from anywhere -- phone included. It's a hobby project built and maintained by one person, and the core collection stays free to use.
about.originalEditionHeading=Original 2000 edition
about.originalEditionBody=Vino i gitare started life as a physical/PDF songbook, written and hand-assembled in 2000. The original is kept exactly as it was -- foreword, layout, and all.
about.downloadOriginalPdf=Download the original PDF
about.originalEditionCoverAlt=Cover of the original 2000 edition of Vino i gitare

about.installHeading=Install and use offline
about.installBody=Vino i gitare can be installed like a regular app: on desktop, look for an install icon in your browser's address bar; on Android, use the browser menu's "Add to Home screen"; on iPhone/iPad, use Safari's Share button and "Add to Home Screen" (installing only works from Safari on iOS). Once installed, any song you've opened while online stays readable offline -- handy mid-gig with no signal. Search, admin, and the PDF download still need a connection.
about.privacyHeading=Privacy
about.privacyBody=This site has no visitor accounts, no tracking cookies, and no analytics. Song view counts are a simple aggregate number, not tied to any visitor or device. Light/dark mode preference is stored only in your own browser and is never sent to this server. The support button below is a plain link out to Ko-fi (opens in a new tab) -- nothing loads from Ko-fi on this page itself, but Ko-fi has its own separate privacy policy once you get there.
about.supportHeading=Support
about.supportBody=If you enjoy this collection and want to help keep it running, consider buying me a coffee.
about.supportButton=Buy me a coffee

offline.title=You're offline
offline.heading=You're offline
offline.body=This page hasn't been loaded before, so there's nothing cached to show. Songs you've already opened while online stay available offline -- reconnect and try again for anything else.
