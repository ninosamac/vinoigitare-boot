# Sav sadržaj je sada stvaran, konačan tekst. Ko-fi veza (about.html) je
# bila poslednji placeholder; potvrđena 2026-07-12 (ko-fi.com/ninosamac,
# obična veza umesto plutajućeg widgeta).
about.title=O sajtu
about.metaDescription=Vino i gitare je besplatna online zbirka akorda i tablatura za pesme sa prostora bivše Jugoslavije. Preuzmite originalni PDF zbirke Vino i gitare (izdanje iz 2000. godine), ili pregledajte i pretražujte akorde online -- radi i bez interneta nakon instalacije.
about.motivationHeading=Zašto ovo postoji
about.motivationImageAlt=Električna gitara, čaša vina i ručno pisane note na drvenom stolu
about.motivationBody=Vino i gitare je počelo kao lični projekat digitalizacije sveske akorda i tekstova pesama koju koristim godinama uz drugare, da bi bilo lako pretraživati, čitati i svirati odakle god -- pa i sa telefona. Ovo je hobi projekat koji vodi jedna osoba, a osnovna zbirka ostaje besplatna za korišćenje.
about.originalEditionHeading=Originalno izdanje iz 2000. godine
about.originalEditionBody=Vino i gitare je nastalo kao fizička/PDF zbirka pesama, napisana i ručno sastavljena 2000. godine. Original je sačuvan u potpunosti onakav kakav je bio -- predgovor, izgled, sve.
about.downloadOriginalPdf=Preuzmi originalni PDF
about.originalEditionCoverAlt=Naslovna strana originalnog izdanja knjige Vino i gitare iz 2000. godine

about.installHeading=Instalacija i rad bez interneta
about.installBody=Vino i gitare možete instalirati kao pravu aplikaciju: na računaru potražite ikonu za instalaciju u adresnoj traci pregledača; na Androidu koristite "Dodaj na početni ekran" u meniju pregledača; na iPhone/iPad uređajima koristite Safari-jevo dugme Podeli i "Dodaj na početni ekran" (instalacija na iOS-u radi samo iz Safarija). Nakon instalacije, svaka pesma koju ste otvorili dok ste bili na vezi ostaje čitljiva i bez internet veze -- korisno usred svirke bez signala. Pretraga, admin i preuzimanje PDF-a i dalje zahtevaju vezu.
about.privacyHeading=Privatnost
about.privacyBody=Ovaj sajt nema naloge posetilaca, ne koristi kolačiće za praćenje i nema analitiku. Broj pregleda pesme je jednostavan zbirni broj, bez veze sa bilo kojim posetiocem ili uređajem. Podešavanje svetlog/tamnog režima čuva se samo u vašem pregledaču i nikada se ne šalje na server. Dugme za podršku ispod je obična veza ka Ko-fi sajtu (otvara se u novoj kartici) -- ništa se ne učitava sa Ko-fi sajta na ovoj strani, ali Ko-fi ima sopstvenu politiku privatnosti kada tamo stignete.
about.supportHeading=Podrška
about.supportBody=Ako vam se dopada ova zbirka i želite da pomognete da ostane aktivna, možete me častiti kafom.
about.supportButton=Časti me kafom

offline.title=Bez internet veze
offline.heading=Bez internet veze
offline.body=Ova stranica još nije bila učitana, pa nema ništa sačuvano za prikaz. Pesme koje ste već otvorili dok ste bili na vezi ostaju dostupne bez veze -- za sve ostalo, ponovo se povežite i pokušajte opet.

footer.copyright=© {0} Vino i gitare. Sva prava zadržana.

